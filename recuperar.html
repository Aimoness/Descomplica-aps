<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar senha - Portal UBS</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1351B4">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="./logo.png">

<style>
body{
  background: linear-gradient(135deg,#e8f1fb,#f4f8fc);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 16px;
}

.login-container{
  background:#fff;
  padding:32px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
  width:100%;
  max-width:420px;
}

.titulo-sistema{
  font-weight:700;
  color:#1351B4;
  font-size:28px;
}

.tipo-badge{
  font-size:14px;
  background:#e3f2fd;
  padding:6px 14px;
  border-radius:20px;
  display:inline-block;
}

.form-control{
  height:46px;
  border-radius:9px;
}

button{
  min-height:46px;
  border-radius:9px !important;
  font-weight:700 !important;
}
</style>
</head>

<body class="login-page">

<div id="mensagem"></div>

<div class="login-container">
  <h4 class="text-center titulo-sistema">Recuperar senha</h4>

  <p class="text-center mb-3">
    <span class="tipo-badge" id="tipoEscolhidoTxt"></span>
  </p>

  <div class="mb-3">
    <label class="form-label">CPF cadastrado</label>
    <input
      id="cpfRecuperar"
      class="form-control"
      placeholder="000.000.000-00"
      maxlength="14"
      inputmode="numeric"
      oninput="mascaraCPF(this)">
  </div>

  <div class="mb-3">
    <label class="form-label">Nova senha</label>
    <div style="position:relative;">
      <input
        id="novaSenha"
        type="password"
        class="form-control"
        placeholder="Digite a nova senha"
        style="padding-right:40px;">
      <span onclick="toggleSenha('novaSenha')" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">&#128065;</span>
    </div>
  </div>

  <button class="btn btn-primary w-100 mb-2" onclick="recuperarSenha()">Atualizar senha</button>
  <a href="login.html" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center">Voltar para login</a>
</div>

<script src="script.js"></script>
<script>
const t = localStorage.getItem("tipoEscolhido");
const tipoTexto = document.getElementById("tipoEscolhidoTxt");

if (tipoTexto) {
  tipoTexto.innerText = t
    ? "Acesso como: " + (t === "profissional" ? "Profissional" : "Paciente")
    : "Informe seu CPF para redefinir a senha";
}
</script>
</body>
</html>
